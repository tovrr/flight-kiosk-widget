# CI Pipeline Template — Devforge Systems Estate
# Usage: Copy to .github/workflows/ci.yml in any JS/TS repo
# Customize: node-version, scripts if different from npm standard

name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint-test-build:
    name: Lint & Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  secret-guard:
    name: Secret Leak Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for committed secrets
        run: |
          echo "Checking for potential secrets in commits..."
          # Check if any .env files are committed
          if git ls-files | grep -q '\.env$'; then
            echo "❌ .env file is committed! Remove it!"
            exit 1
          fi
          # Check for API keys in code
          if git ls-files | xargs grep -l 'AIzaSy\|sk_live\|pk_live\|ghp_\|gho_' 2>/dev/null; then
            echo "❌ Potential secrets found in committed files!"
            exit 1
          fi
          echo "✅ No secrets detected"
